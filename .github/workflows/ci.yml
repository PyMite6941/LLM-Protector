name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (lint · test · import)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff pytest
      - name: Lint (Ruff)
        run: ruff check .
      - name: Unit tests (offline detection + scoring)
        run: pytest -q
      - name: Import smoke test
        run: python -c "import scanner, main, pipeline; assert main.app.routes; print('OK')"

  frontend:
    name: Frontend (lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Production build
        run: npm run build
